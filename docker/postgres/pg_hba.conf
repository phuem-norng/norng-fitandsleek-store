# PostgreSQL Client Authentication Configuration
# This file controls: which hosts are allowed to connect, how they authenticate,
# which PostgreSQL user names they can use, and which databases they can access.

# TYPE  DATABASE        USER            ADDRESS                 METHOD
# Local unix domain socket connections:
local   all             all                                     trust
# IPv4 local connections:
host    all             all             127.0.0.1/32            trust
# IPv6 local connections:
host    all             all             ::1/128                 trust
# Docker network connections with password:
host    all             all             0.0.0.0/0               md5
