# Postgres only for local dev. Prefer the repo root stack:
#   cd .. && docker compose up -d db
#
# Host tools (php artisan, pgAdmin): localhost:5433
# In-stack backend container: DB_HOST=db, DB_PORT=5432

services:
  db:
    image: postgres:15-alpine
    container_name: fitandsleek_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    name: fitandsleek_fullstack_postgres_data
