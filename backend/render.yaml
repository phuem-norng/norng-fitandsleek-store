# Render Blueprint (optional). Primary fix: entrypoint binds nginx to $PORT.
services:
  - type: web
    name: fitandsleek-official-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    branch: main
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://fitandsleek-official-backend.onrender.com
      - key: FRONTEND_URL
        value: https://www.fitandsleek.online
      - key: SANCTUM_STATEFUL_DOMAINS
        value: fitandsleek.online,www.fitandsleek.online,fitandsleek-official.vercel.app
      - key: RUN_MIGRATIONS
        value: "false"
      # Media — Cloudinary (recommended production: CDN + auto resize/WebP)
      - key: FILESYSTEM_DISK
        value: cloudinary
      - key: ADMIN_PROFILE_IMAGE_DISK
        value: cloudinary
      - key: MEDIA_FALLBACK_TO_PUBLIC
        value: "false"
      - key: ADMIN_PROFILE_IMAGE_FALLBACK_TO_PUBLIC
        value: "false"
      - key: CLOUDINARY_CLOUD_NAME
        value: media-fitandsleek
      # Secrets (Render dashboard only): APP_KEY, DATABASE_URL, RESEND_API_KEY,
      # CLOUDINARY_URL, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
      # Optional later: switch to R2 + cdn.fitandsleek.online (see .env.example)
