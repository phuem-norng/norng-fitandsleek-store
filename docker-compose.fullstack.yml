services:
  db:
    image: postgres:15-alpine
    container_name: fitandsleek_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitandsleek_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Norng@123"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fitandsleek_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fitandsleek.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitandsleek_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: fitandsleek_v2
      DB_USERNAME: postgres
      DB_PASSWORD: "Norng@123"
      APP_URL: http://localhost:8000
      APP_PORT: 8000
      SERVER_PORT: 8000
      IMAGE_VECTORIZE_URL: http://host.docker.internal:9000/vectorize
      QDRANT_URL: http://host.docker.internal:6333
    command: sh -lc "sed -i 's|^DB_HOST=.*|DB_HOST=db|' .env && sed -i 's|^DB_PORT=.*|DB_PORT=5432|' .env && sed -i 's|^DB_DATABASE=.*|DB_DATABASE=fitandsleek_v2|' .env && sed -i 's|^DB_USERNAME=.*|DB_USERNAME=postgres|' .env && sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=Norng@123|' .env && sed -i 's|^DB_SSLMODE=.*|DB_SSLMODE=disable|' .env && sed -i 's|^QDRANT_URL=.*|QDRANT_URL=http://host.docker.internal:6333|' .env && sed -i 's|^IMAGE_VECTORIZE_URL=.*|IMAGE_VECTORIZE_URL=http://host.docker.internal:9000/vectorize|' .env && rm -rf public/storage && php artisan storage:link && php artisan config:clear && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - default
      - fitandsleek_fullstack_default
    ports:
      - "8000:8000"
    volumes:
      # Sync PHP source from host (AVIF validation, etc.) without replacing vendor/ from the image
      - ./backend/app:/var/www/html/app
      - ./backend/routes:/var/www/html/routes
      - ./backend/public:/var/www/html/public
      - ./backend/storage/app/public:/var/www/html/storage/app/public

  frontend:
    image: node:20-alpine
    container_name: fitandsleek_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_BACKEND_ORIGIN: http://localhost:8000
      VITE_PROXY_TARGET: http://host.docker.internal:8000
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  pgadmin_data:

networks:
  fitandsleek_fullstack_default:
    external: true
